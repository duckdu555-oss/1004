<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <title>로그인</title>
  <style>
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{width:100%;min-height:100%;margin:0;touch-action:manipulation}
    body{min-height:100vh;background:linear-gradient(180deg,#fff,#fbfdff 58%,#f1f6fb);font-family:Pretendard,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:#111;overscroll-behavior:none}
    button,input{font:inherit;touch-action:manipulation}
    .page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 20px}
    .login-wrap{width:100%;max-width:460px}
    .image-area{margin-bottom:30px;overflow:hidden;border-radius:18px;background:rgba(255,255,255,.72);box-shadow:0 10px 30px rgba(130,150,170,.08)}
    .image-area img{display:block;width:100%;height:auto}
    .login-form{display:flex;flex-direction:column;gap:12px}
    .login-form input,.login-form button{width:100%;height:54px;border-radius:999px}
    .login-form input{padding:0 18px;border:1px solid #d8e0e7;background:#fff;outline:none;font-size:16px}
    .login-form input:focus{border-color:#8ca7bd;box-shadow:0 0 0 3px rgba(140,167,189,.12)}
    button{cursor:pointer;font-weight:800}
    .login-button{border:0;background:#111;color:#fff}
    .signup-button{border:1px solid #dfe7ed;background:#eef3f7;color:#111}
    .message{display:none;margin:4px 8px 0;font-size:13px;text-align:center;line-height:1.5}
    .message.show{display:block}.message.error{color:#c93340}.message.ok{color:#25734a}
    .loading{display:none;text-align:center;padding:10px;font-size:13px}.loading.show{display:block}
    .progress-overlay{position:fixed;inset:0;z-index:100;display:none;align-items:center;justify-content:center;padding:24px;background:rgba(20,26,34,.58);backdrop-filter:blur(5px)}
    .progress-overlay.show{display:flex}
    .progress-box{width:100%;max-width:360px;padding:25px 22px;background:#fff;border-radius:20px;box-shadow:0 22px 60px rgba(0,0,0,.24)}
    .progress-title{text-align:center;font-size:17px;font-weight:900;margin-bottom:16px}
    .progress-track{height:12px;border-radius:999px;background:#edf1f4;overflow:hidden}
    .progress-bar{width:0;height:100%;border-radius:999px;background:#6f84a0;transition:width .06s linear}
    .progress-percent{text-align:center;margin-top:12px;font-size:14px;font-weight:850;color:#40526a}
    @media(max-width:520px){
      .page{padding:48px 24px;align-items:center}
      .login-wrap{max-width:350px}
      .image-area{margin:0 auto 24px;border-radius:16px}
      .login-form{gap:10px}
      .login-form input,.login-form button{height:48px}
    }
    @media(max-width:360px){.login-wrap{max-width:320px}.page{padding-left:20px;padding-right:20px}}

  </style>
</head>
<body>
<main class="page"><section class="login-wrap">
  <div class="image-area"><img src="./image/login-image.png" alt="상단 이미지"></div>
  <form class="login-form" id="loginForm">
    <input type="text" id="userId" placeholder="아이디" autocomplete="username" required>
    <input type="password" id="password" placeholder="비밀번호" autocomplete="current-password" required>
    <button type="submit" class="login-button">로그인</button>
    <button type="button" class="signup-button" id="signupButton">회원가입</button>
    <div class="loading" id="loading">로그인 확인 중...</div>
    <p class="message" id="message"></p>
  </form>
</section></main>
<div class="progress-overlay" id="progressOverlay" aria-hidden="true">
  <div class="progress-box" role="status" aria-live="polite">
    <div class="progress-title">회원가입 페이지로 이동 중</div>
    <div class="progress-track"><div class="progress-bar" id="progressBar"></div></div>
    <div class="progress-percent" id="progressPercent">0%</div>
  </div>
</div>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="/api/config"></script><script src="./supabase-client.js"></script>
<script>
const form=document.getElementById('loginForm'),msg=document.getElementById('message'),loading=document.getElementById('loading');
const signupButton=document.getElementById('signupButton'),progressOverlay=document.getElementById('progressOverlay'),progressBar=document.getElementById('progressBar'),progressPercent=document.getElementById('progressPercent');
const show=(text,type='error')=>{msg.textContent=text;msg.className=`message show ${type}`};
signupButton.addEventListener('click',()=>{
  if(signupButton.disabled)return;
  signupButton.disabled=true;
  progressOverlay.classList.add('show');
  progressOverlay.setAttribute('aria-hidden','false');
  let progress=0;
  const timer=setInterval(()=>{
    progress=Math.min(100,progress+Math.floor(Math.random()*9)+4);
    progressBar.style.width=progress+'%';
    progressPercent.textContent=progress+'%';
    if(progress>=100){
      clearInterval(timer);
      setTimeout(()=>location.href='signup.html',120);
    }
  },45);
});

form.addEventListener('submit',async e=>{
  e.preventDefault(); msg.className='message'; loading.classList.add('show');
  const userId=document.getElementById('userId').value.trim().toLowerCase();
  const password=document.getElementById('password').value;
  try{
    const {data,error}=await sb.rpc('member_login',{p_user_id:userId,p_password:password});
    if(error) throw error;
    localStorage.setItem('memberSession',JSON.stringify({...data,loggedInAt:new Date().toISOString()}));
    show(`${data.nickname}님, 로그인되었습니다.`,'ok');
    // 실제 메인 페이지 주소로 변경
    setTimeout(()=>location.href='main.html',500);
  }catch(err){
    const m=String(err.message||err);
    if(m.includes('PENDING_APPROVAL')) show('가입 승인 대기 중입니다.');
    else if(m.includes('REJECTED_MEMBER')) show('회원가입이 거절된 계정입니다.');
    else show('아이디 또는 비밀번호가 올바르지 않습니다.');
  }finally{loading.classList.remove('show')}
});
</script>
</body></html>
