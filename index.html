<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <title>로그인</title>
  <style>
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{width:100%;min-height:100%;margin:0;touch-action:manipulation}
    body{min-height:100vh;background:linear-gradient(180deg,#fff,#fbfdff 58%,#f1f6fb);font-family:Pretendard,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:#111;overscroll-behavior:none}
    .snow{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
    .snowflake{position:absolute;top:-12px;border-radius:50%;background:rgba(175,194,211,.72);box-shadow:0 0 7px rgba(190,210,228,.28);animation:snowfall linear infinite}
    @keyframes snowfall{0%{transform:translate3d(0,-20px,0);opacity:0}12%{opacity:1}100%{transform:translate3d(var(--drift),110vh,0);opacity:.15}}
    button,input{font:inherit;touch-action:manipulation}
    .page{position:relative;z-index:1;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 20px}
    .login-wrap{width:100%;max-width:980px}
    .image-area{width:100%;max-width:460px;margin:0 auto 30px;overflow:hidden;border-radius:18px;background:rgba(255,255,255,.72);box-shadow:0 10px 30px rgba(130,150,170,.08)}
    .image-area img{display:block;width:100%;height:auto}
    .login-content{position:relative;width:100%;min-height:258px}
    .banner-section{position:fixed;left:50%;top:50%;z-index:20;width:min(96vw,1840px);transform:translate(-50%,-50%)}
    .banner-grid{display:grid;grid-template-columns:repeat(4,minmax(0,440px));justify-content:center;align-items:center;gap:18px;width:100%;margin:0 auto}
    .banner-card{position:relative;overflow:hidden;border-radius:20px;background:rgba(255,255,255,.96);box-shadow:0 18px 54px rgba(55,70,88,.22);width:100%}
    .banner-card img{display:block;width:100%;height:auto;max-height:68vh;object-fit:contain;cursor:pointer}
    .banner-actions{display:flex;align-items:center;justify-content:flex-end;gap:8px;padding:8px 10px;background:rgba(255,255,255,.98);border-top:1px solid #e8edf1}
    .banner-hide-today{border:0;background:transparent;color:#526271;font-size:12px;font-weight:800;padding:5px 4px}
    .banner-close{position:static;width:28px;height:28px;border:0;border-radius:50%;background:rgba(0,0,0,.68);color:#fff;font-size:17px;line-height:1;display:grid;place-items:center;padding:0}
    .banner-card.is-hidden{display:none}
    .banner-section.is-hidden{display:none}
    .login-panel{width:100%;max-width:460px;margin:0 auto}
    .login-form{display:flex;flex-direction:column;gap:12px}
    .login-form input,.login-form button{width:100%;height:54px;border-radius:999px}
    .login-form input{padding:0 18px;border:1px solid #d8e0e7;background:#fff;outline:none;font-size:16px}
    .login-form input:focus{border-color:#8ca7bd;box-shadow:0 0 0 3px rgba(140,167,189,.12)}
    .security-row{display:grid;grid-template-columns:1fr 150px;gap:10px}
    .security-code{height:54px;border:1px solid #d8e0e7;border-radius:999px;background:linear-gradient(135deg,#eef3f7,#fff);display:flex;align-items:center;justify-content:center;gap:9px;padding:0 12px;user-select:none}
    .security-code-text{font-family:ui-monospace,SFMono-Regular,Consolas,monospace;font-size:20px;font-weight:950;letter-spacing:3px;color:#35485c;text-decoration:line-through;text-decoration-color:rgba(80,100,120,.3)}
    .security-refresh{width:30px!important;height:30px!important;min-width:30px;border:0;border-radius:50%!important;background:#dfe8ef;color:#26394d;padding:0;font-size:17px;line-height:1}
    button{cursor:pointer;font-weight:800}
    .login-button{border:0;background:#111;color:#fff}
    .signup-button{border:1px solid #dfe7ed;background:#eef3f7;color:#111}
    .message{display:none;margin:4px 8px 0;font-size:13px;text-align:center;line-height:1.5}
    .message.show{display:block}.message.error{color:#c93340}.message.ok{color:#25734a}
    .loading{display:none;text-align:center;padding:10px;font-size:13px}.loading.show{display:block}
    .progress-overlay{position:fixed;inset:0;z-index:100;display:none;align-items:center;justify-content:center;padding:24px;background:rgba(20,26,34,.58);backdrop-filter:blur(5px)}
    .progress-overlay.show{display:flex}
    .progress-box{width:100%;max-width:360px;padding:25px 22px;background:#fff;border-radius:20px;box-shadow:0 22px 60px rgba(0,0,0,.24)}
    .progress-title{text-align:center;font-size:17px;font-weight:900;margin-bottom:16px}
    .progress-track{height:12px;border-radius:999px;background:#edf1f4;overflow:hidden}
    .progress-bar{width:0;height:100%;border-radius:999px;background:#6f84a0;transition:width .06s linear}
    .progress-percent{text-align:center;margin-top:12px;font-size:14px;font-weight:850;color:#40526a}
    @media(max-width:520px){
      .page{padding:48px 24px;align-items:center}
      .login-wrap{max-width:350px}
      .image-area{margin:0 auto 24px;border-radius:16px}
      .login-content{min-height:232px}
      .banner-section{width:100%;max-width:380px}
      .banner-grid{display:flex;justify-content:flex-start;gap:12px;overflow-x:auto;scroll-snap-type:x mandatory;scroll-padding-inline:calc((100% - min(86vw,338px))/2);padding-inline:calc((100% - min(86vw,338px))/2);scrollbar-width:none;overscroll-behavior-x:contain}
      .banner-grid::-webkit-scrollbar{display:none}
      .banner-card{flex:0 0 min(86vw,338px);scroll-snap-align:center;border-radius:18px}
      .banner-card img{width:100%;height:min(69vh,560px);object-fit:contain;background:#fff}
      .login-form{gap:10px}
      .login-form input,.login-form button{height:48px}
      .security-row{grid-template-columns:1fr 128px;gap:8px}
      .security-code{height:48px;padding:0 9px}
      .security-code-text{font-size:17px;letter-spacing:2px}
    }
    @media(max-width:360px){.login-wrap{max-width:320px}.page{padding-left:20px;padding-right:20px}}

  </style>
</head>
<body>
<div class="snow" id="snow" aria-hidden="true"></div>
<main class="page"><section class="login-wrap">
  <div class="image-area"><img src="./image/login-image.png" alt="상단 이미지"></div>
  <div class="login-content">
  <section class="banner-section" id="bannerSection" aria-label="안내 배너">
    <div class="banner-grid" id="bannerGrid">
      <article class="banner-card" data-banner-id="1"><img src="./image/banner1.png" alt="배너 1"><div class="banner-actions"><button type="button" class="banner-hide-today">오늘 하루 보지 않기</button><button type="button" class="banner-close" aria-label="배너 1 닫기">×</button></div></article>
      <article class="banner-card" data-banner-id="2"><img src="./image/banner2.png" alt="배너 2"><div class="banner-actions"><button type="button" class="banner-hide-today">오늘 하루 보지 않기</button><button type="button" class="banner-close" aria-label="배너 2 닫기">×</button></div></article>
      <article class="banner-card" data-banner-id="3"><img src="./image/banner3.png" alt="배너 3"><div class="banner-actions"><button type="button" class="banner-hide-today">오늘 하루 보지 않기</button><button type="button" class="banner-close" aria-label="배너 3 닫기">×</button></div></article>
      <article class="banner-card" data-banner-id="4"><img src="./image/banner4.png" alt="배너 4"><div class="banner-actions"><button type="button" class="banner-hide-today">오늘 하루 보지 않기</button><button type="button" class="banner-close" aria-label="배너 4 닫기">×</button></div></article>
    </div>
  </section>
  <div class="login-panel">
  <form class="login-form" id="loginForm" novalidate>
    <input type="text" id="userId" placeholder="아이디" autocomplete="username" required>
    <input type="password" id="password" placeholder="비밀번호" autocomplete="current-password" required>
    <div class="security-row">
      <input type="text" id="securityCodeInput" placeholder="보안코드 입력" autocomplete="off" autocapitalize="characters" spellcheck="false" required maxlength="5">
      <div class="security-code" aria-label="보안코드">
        <span class="security-code-text" id="securityCodeText"></span>
        <button type="button" class="security-refresh" id="securityRefresh" aria-label="보안코드 새로고침">↻</button>
      </div>
    </div>
    <button type="submit" class="login-button">로그인</button>
    <button type="button" class="signup-button" id="signupButton">회원가입</button>
    <div class="loading" id="loading">로그인 확인 중...</div>
    <p class="message" id="message"></p>
  </form>
  </div>
  </div>
</section></main>
<div class="progress-overlay" id="progressOverlay" aria-hidden="true">
  <div class="progress-box" role="status" aria-live="polite">
    <div class="progress-title">회원가입 페이지로 이동 중</div>
    <div class="progress-track"><div class="progress-bar" id="progressBar"></div></div>
    <div class="progress-percent" id="progressPercent">0%</div>
  </div>
</div>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="/api/config"></script><script src="./supabase-client.js"></script>
<script>
const form=document.getElementById('loginForm'),msg=document.getElementById('message'),loading=document.getElementById('loading');
const signupButton=document.getElementById('signupButton'),progressOverlay=document.getElementById('progressOverlay'),progressBar=document.getElementById('progressBar'),progressPercent=document.getElementById('progressPercent');
const show=(text,type='error')=>{msg.textContent=text;msg.className=`message show ${type}`};

const snowContainer=document.getElementById('snow');
const snowflakeCount=window.innerWidth<=520?70:120;
for(let i=0;i<snowflakeCount;i+=1){
  const snowflake=document.createElement('span');
  const size=Math.random()*6+2;
  snowflake.className='snowflake';
  snowflake.style.left=Math.random()*100+'vw';
  snowflake.style.width=size+'px';
  snowflake.style.height=size+'px';
  snowflake.style.opacity=Math.random()*.65+.25;
  snowflake.style.animationDuration=Math.random()*7+6+'s';
  snowflake.style.animationDelay=Math.random()*-16+'s';
  snowflake.style.setProperty('--drift',Math.random()*180-90+'px');
  snowContainer.appendChild(snowflake);
}

const securityCodeText=document.getElementById('securityCodeText');
const securityCodeInput=document.getElementById('securityCodeInput');
const securityRefresh=document.getElementById('securityRefresh');
let currentSecurityCode='';
const createSecurityCode=()=>{
  const chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  currentSecurityCode=Array.from({length:5},()=>chars[Math.floor(Math.random()*chars.length)]).join('');
  securityCodeText.textContent=currentSecurityCode;
  securityCodeInput.value='';
};
securityCodeInput.addEventListener('input',()=>{
  securityCodeInput.value=securityCodeInput.value.toUpperCase().replace(/[^A-Z0-9]/g,'').slice(0,5);
});
securityRefresh.addEventListener('click',()=>{createSecurityCode();securityCodeInput.focus()});
createSecurityCode();
const bannerSection=document.getElementById('bannerSection');
const bannerGrid=document.getElementById('bannerGrid');
const bannerCards=[...bannerGrid.querySelectorAll('.banner-card')];
const bannerStorageKey=id=>`hideBanner${id}Until`;
const tomorrowMidnight=()=>{const d=new Date();d.setHours(24,0,0,0);return d.getTime()};
const updateBannerSection=()=>{
  const hasVisible=bannerCards.some(card=>!card.classList.contains('is-hidden'));
  bannerSection.classList.toggle('is-hidden',!hasVisible);
};
const hideBannerCard=card=>{card.classList.add('is-hidden');updateBannerSection()};
bannerCards.forEach(card=>{
  const id=card.dataset.bannerId;
  const hiddenUntil=Number(localStorage.getItem(bannerStorageKey(id))||0);
  if(hiddenUntil>Date.now()) card.classList.add('is-hidden');
  else localStorage.removeItem(bannerStorageKey(id));
});
updateBannerSection();
bannerGrid.addEventListener('click',event=>{
  const card=event.target.closest('.banner-card');
  if(!card)return;
  if(event.target.closest('.banner-hide-today')){
    localStorage.setItem(bannerStorageKey(card.dataset.bannerId),String(tomorrowMidnight()));
    hideBannerCard(card);
    return;
  }
  if(event.target.closest('.banner-close')||event.target.tagName==='IMG') hideBannerCard(card);
});
signupButton.addEventListener('click',()=>{
  if(signupButton.disabled)return;
  signupButton.disabled=true;
  progressOverlay.classList.add('show');
  progressOverlay.setAttribute('aria-hidden','false');
  let progress=0;
  const timer=setInterval(()=>{
    progress=Math.min(100,progress+Math.floor(Math.random()*9)+4);
    progressBar.style.width=progress+'%';
    progressPercent.textContent=progress+'%';
    if(progress>=100){
      clearInterval(timer);
      setTimeout(()=>location.href='signup.html',120);
    }
  },45);
});

form.addEventListener('submit',async e=>{
  e.preventDefault(); msg.className='message';
  const userIdInput=document.getElementById('userId');
  const passwordInput=document.getElementById('password');
  const userId=userIdInput.value.trim().toLowerCase();
  const password=passwordInput.value;
  if(!userId){show('아이디를 입력해 주세요.');userIdInput.focus();return;}
  if(!password){show('비밀번호를 입력해 주세요.');passwordInput.focus();return;}
  const enteredSecurityCode=securityCodeInput.value.trim().toUpperCase();
  if(!enteredSecurityCode){show('보안코드를 입력해 주세요.');securityCodeInput.focus();return;}
  if(enteredSecurityCode!==currentSecurityCode){show('보안코드가 일치하지 않습니다. 다시 입력해 주세요.');createSecurityCode();securityCodeInput.focus();return;}
  loading.classList.add('show');
  try{
    const {data,error}=await sb.rpc('member_login',{p_user_id:userId,p_password:password});
    if(error) throw error;
    localStorage.setItem('memberSession',JSON.stringify({...data,loggedInAt:new Date().toISOString()}));
    show(`${data.nickname}님, 로그인되었습니다.`,'ok');
    // 실제 메인 페이지 주소로 변경
    setTimeout(()=>location.href='main.html',500);
  }catch(err){
    const m=String(err.message||err);
    if(m.includes('PENDING_APPROVAL')) show('가입 승인 대기 중입니다.');
    else if(m.includes('REJECTED_MEMBER')) show('회원가입이 거절된 계정입니다.');
    else show('아이디 또는 비밀번호가 올바르지 않습니다.');
    createSecurityCode();
  }finally{loading.classList.remove('show')}
});
</script>
</body></html>
