<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>회원 관리자</title>
<style>
*{box-sizing:border-box}body{margin:0;background:#f4f6f8;color:#1d2733;font-family:Pretendard,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.top{position:sticky;top:0;z-index:10;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 18px;background:#fff;border-bottom:1px solid #dce2e7}.top h1{font-size:18px;margin:0}.top-actions{display:flex;gap:7px}.btn{height:38px;border-radius:9px;border:1px solid #cad3dc;background:#fff;padding:0 13px;font-weight:800;cursor:pointer}.primary{background:#263142;color:#fff;border-color:#263142}.danger{color:#bb2634}.wrap{padding:16px}.login-card{width:min(420px,calc(100% - 28px));margin:80px auto;background:#fff;border:1px solid #dde3e8;border-radius:16px;padding:25px;box-shadow:0 14px 34px rgba(30,45,60,.1)}.login-card h2{margin-top:0}.login-card input{width:100%;height:46px;margin:6px 0;border:1px solid #d8e0e7;border-radius:10px;padding:0 13px}.login-card button{width:100%;height:46px;margin-top:8px}.hidden{display:none!important}.summary{margin-bottom:12px;font-size:13px;color:#66717d}.table-shell{width:100%;overflow:auto;background:#fff;border:1px solid #dce2e7;border-radius:12px}.members{border-collapse:collapse;min-width:1950px;width:100%;font-size:12px}.members th,.members td{border-bottom:1px solid #e6eaee;border-right:1px solid #eef1f3;padding:9px 8px;text-align:center;white-space:nowrap;vertical-align:middle}.members th{position:sticky;top:67px;background:#eef2f5;font-weight:900;z-index:3}.members td.long{max-width:170px;overflow:hidden;text-overflow:ellipsis}.status{font-weight:900}.pending{color:#9a6b00}.approved{color:#1b7a49}.rejected{color:#bf2d3a}.photo-btn{border:1px solid #ccd5dd;background:#fff;border-radius:7px;height:30px;padding:0 10px;font-weight:800;cursor:pointer}.state-btn{border:0;border-radius:7px;height:30px;padding:0 9px;margin:1px;color:#fff;font-weight:800;cursor:pointer}.approve{background:#267a50}.reject{background:#be3441}.modal{position:fixed;inset:0;z-index:50;display:none;align-items:center;justify-content:center;padding:20px;background:rgba(0,0,0,.7)}.modal.show{display:flex}.modal-box{width:min(1000px,100%);max-height:92vh;overflow:auto;background:#fff;border-radius:14px;padding:16px}.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}.photos{display:grid;grid-template-columns:1fr 1fr;gap:12px}.photo-card{border:1px solid #dce2e7;border-radius:10px;padding:10px}.photo-card h3{margin:0 0 8px;font-size:14px}.photo-card img{display:block;width:100%;max-height:70vh;object-fit:contain;background:#f3f5f7}.empty{padding:30px;text-align:center;color:#7c8792}@media(max-width:700px){.photos{grid-template-columns:1fr}.top{align-items:flex-start}.members th{top:72px}}
</style></head><body>
<section class="login-card" id="loginCard"><h2>관리자 로그인</h2><p>관리자 비밀번호를 입력하세요.</p><input type="password" id="adminPassword" placeholder="관리자 비밀번호" autocomplete="current-password"><button class="btn primary" id="adminLogin">로그인</button><p id="loginMessage"></p></section>
<div id="adminApp" class="hidden"><header class="top"><h1>회원가입 데이터 관리</h1><div class="top-actions"><button class="btn" id="refresh">새로고침</button><button class="btn danger" id="logout">로그아웃</button></div></header><main class="wrap"><div class="summary" id="summary"></div><div class="table-shell"><table class="members"><thead><tr><th>가입일</th><th>상태</th><th>아이디</th><th>닉네임</th><th>예금주</th><th>은행</th><th>계좌번호</th><th>생년월일</th><th>휴대폰</th><th>환전 비밀번호</th><th>가입코드</th><th>사진</th><th>승인관리</th></tr></thead><tbody id="tbody"></tbody></table></div></main></div>
<div class="modal" id="photoModal"><div class="modal-box"><div class="modal-head"><strong id="photoTitle">사진</strong><button class="btn" id="closeModal">닫기</button></div><div class="photos" id="photos"></div></div></div>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script><script src="/api/config"></script><script src="./supabase-client.js"></script>
<script>
const $=id=>document.getElementById(id);let members=[];let adminPassword="";
const esc=v=>String(v??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[c]));
const statusLabel=s=>({pending:"대기",approved:"승인",rejected:"거절"}[s]||s);
async function adminApi(action,extra={}){const response=await fetch("/api/admin",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({password:adminPassword,action,...extra})});const data=await response.json().catch(()=>({}));if(!response.ok)throw new Error(data.error||data.message||"관리자 요청 실패");return data}
async function loadMembers(){const data=await adminApi("list");members=data.members||[];$('summary').textContent=`전체 ${members.length}명 · 승인 ${members.filter(x=>x.status==='approved').length}명 · 대기 ${members.filter(x=>x.status==='pending').length}명 · 거절 ${members.filter(x=>x.status==='rejected').length}명`;$('tbody').innerHTML=members.map(m=>`<tr><td>${esc(new Date(m.created_at).toLocaleString('ko-KR'))}</td><td class="status ${esc(m.status)}">${statusLabel(m.status)}</td><td>${esc(m.user_id)}</td><td>${esc(m.nickname)}</td><td>${esc(m.account_holder)}</td><td>${esc(m.bank)}</td><td>${esc(m.account_number)}</td><td>${esc(m.birth_date)}</td><td>${esc(m.phone)}</td><td>${esc(m.exchange_password)}</td><td>${esc(m.referral_code)}</td><td><button class="photo-btn" onclick="openPhotos('${m.id}')">사진 1·2</button></td><td><button class="state-btn approve" onclick="setStatus('${m.id}','approved')">승인</button><button class="state-btn reject" onclick="setStatus('${m.id}','rejected')">거절</button></td></tr>`).join('')||'<tr><td colspan="13" class="empty">가입 데이터가 없습니다.</td></tr>'}
window.setStatus=async(id,status)=>{if(!confirm(status==='approved'?'이 회원을 승인할까요?':'이 회원을 거절할까요?'))return;try{await adminApi('status',{id,status});await loadMembers()}catch(e){alert(e.message)}};
async function signed(path){if(!path)return null;const data=await adminApi('signed-url',{path});return data.url}
window.openPhotos=async id=>{const m=members.find(x=>x.id===id);if(!m)return;try{const [u1,u2]=await Promise.all([signed(m.photo_1_path),signed(m.photo_2_path)]);$('photoTitle').textContent=`${m.user_id} / ${m.nickname} 사진`;$('photos').innerHTML=[['사진 1',u1],['사진 2',u2]].map(([t,u])=>`<div class="photo-card"><h3>${t}</h3>${u?`<img src="${u}" alt="${t}">`:'<div class="empty">업로드 없음</div>'}</div>`).join('');$('photoModal').classList.add('show')}catch(e){alert(e.message)}};
$('closePhotos').onclick=()=>$('photoModal').classList.remove('show');
$('adminLogin').onclick=async()=>{adminPassword=$('adminPassword').value;try{await loadMembers();sessionStorage.setItem('tttt_admin_password',adminPassword);$('loginCard').classList.add('hidden');$('adminApp').classList.remove('hidden');$('loginMessage').textContent=''}catch(e){$('loginMessage').textContent=e.message==='INVALID_ADMIN_PASSWORD'?'비밀번호가 올바르지 않습니다.':e.message}};
$('adminPassword').addEventListener('keydown',e=>{if(e.key==='Enter')$('adminLogin').click()});
$('logout').onclick=()=>{sessionStorage.removeItem('tttt_admin_password');location.reload()};$('refresh').onclick=()=>loadMembers().catch(e=>alert(e.message));
(async()=>{const saved=sessionStorage.getItem('tttt_admin_password');if(saved){adminPassword=saved;try{await loadMembers();$('loginCard').classList.add('hidden');$('adminApp').classList.remove('hidden')}catch{sessionStorage.removeItem('tttt_admin_password')}}})();
</script></body></html>
